# クラウドBot: 時間帯別の時事コンテンツ自動生成・X自動投稿
# 番組表（JST）: 5時47分=朝ブリーフィング(20問Q&A) / 12時13分=昼のPollクイズ /
#              17時47分=夕方のPollクイズ / 20時47分=夜の振り返り(20問Q&A)
# - 毎時47分（12時台のみ13分）に起動し、直近スロットが未投稿なら生成して投稿（キャッチアップ方式）
# - 速報チェックは深夜2:00/4:00・朝9:30〜11:00・午後14〜16時の固定時刻cronで実施（post-quiz.mjsのBREAKING_CHECKPOINTS参照）
# - 毎回の実行で、返信期限が来た正解もスレッド返信
# - 手動実行（Run workflow）でdry-run／強制投稿／接続テストが可能
name: Cloud Bot

on:
  schedule:
    # 毎時47分（UTC）。JST判定はスクリプト側で行う。
    # 毎時0分ちょうどはGitHub全体で最も混雑し起動が間引かれやすいため、あえてずらしている
    # （実測: 0分固定だった時期は平均108分間隔＝約半数の回が間引かれていた）
    - cron: '47 * * * *'
    # 昼のスロットだけ12時13分(JST)＝3時13分(UTC)に早めるための追加トリガー。
    # 47分固定のトリガーも12時台には引き続き発火するが、その時点では既に
    # 投稿済みのため実質的に返信・速報チェックのみを行う
    - cron: '13 3 * * *'
    # 速報チェックポイント用の専用トリガー（post-quiz.mjsのBREAKING_CHECKPOINTSと対応）。
    # 経験上ニュースが発生しやすい深夜2:00/4:00・朝9:30〜11:00・午後14〜16時（JST）に起動する
    - cron: '0 17 * * *'  # 深夜2:00
    - cron: '0 19 * * *'  # 深夜4:00
    - cron: '30 0 * * *'  # 朝9:30
    - cron: '0 1 * * *'   # 朝10:00
    - cron: '30 1 * * *'  # 朝10:30
    - cron: '0 2 * * *'   # 朝11:00
    - cron: '0 5 * * *'   # 午後14:00
    - cron: '0 6 * * *'   # 午後15:00
    - cron: '0 7 * * *'   # 午後16:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'dry-run（生成のみ・投稿しない）'
        type: boolean
        default: true
      force_post:
        description: '投稿スロット外でも投稿する（テスト用）'
        type: boolean
        default: true
      test_post:
        description: 'X接続テストのみ（クイズ生成せずテスト投稿を1回）'
        type: boolean
        default: false
      delete_tweet_id:
        description: '誤投稿の削除用（削除したい投稿のtweet IDを入力。空なら何もしない）'
        type: string
        default: ''
      get_tweet_id:
        description: '投稿本文の確認用（確認したい投稿のtweet IDを入力。空なら何もしない。ログに全文を表示）'
        type: string
        default: ''
      topic_hint:
        description: '今回だけ生成トピックを指定（例: ワールドカップ）。空なら通常通り幅広く生成'
        type: string
        default: ''
      feature_topic:
        description: '特集記事モード（番組表と無関係に指定した話題の記事を1本投稿。例: アルゼンチン対イングランドの試合内容）。空なら通常通り'
        type: string
        default: ''
      breaking_topic:
        description: '手動速報モード（指定した話題の🚨速報を1本投稿。1日2回の速報上限にカウントされる）。空なら通常通り'
        type: string
        default: ''

permissions:
  contents: write
  issues: write   # 実行失敗時のIssue自動作成用

concurrency:
  group: cloud-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: コンテンツ生成・投稿
        run: node cloud-bot/post-quiz.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Secretsは X_API_KEY / X_API_SECRET / X_ACCESS_TOKEN / X_ACCESS_TOKEN_SECRET という名前で登録済み。
          # スクリプト内部の変数名（TWITTER_*）に合わせてここでマッピングする
          TWITTER_CONSUMER_KEY: ${{ secrets.X_API_KEY }}
          TWITTER_CONSUMER_SECRET: ${{ secrets.X_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run && 'true' || 'false' }}
          FORCE_POST: ${{ github.event_name == 'workflow_dispatch' && inputs.force_post && 'true' || 'false' }}
          TEST_POST: ${{ github.event_name == 'workflow_dispatch' && inputs.test_post && 'true' || 'false' }}
          DELETE_TWEET_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.delete_tweet_id || '' }}
          TOPIC_HINT: ${{ github.event_name == 'workflow_dispatch' && inputs.topic_hint || '' }}
          FEATURE_TOPIC: ${{ github.event_name == 'workflow_dispatch' && inputs.feature_topic || '' }}
          BREAKING_TOPIC: ${{ github.event_name == 'workflow_dispatch' && inputs.breaking_topic || '' }}
          GET_TWEET_ID: ${{ github.event_name == 'workflow_dispatch' && inputs.get_tweet_id || '' }}
          # ANSWER_DELAY_HOURS: '2'        # 正解返信・Poll投票期間の長さ
          # MONTHLY_POST_LIMIT: '450'      # 月間投稿数の安全上限（X無料枠対策）
          # BREAKING_ENABLED: 'false'      # 速報チェックを止めたい場合はfalseに

      - name: 状態（返信キュー・出題履歴）をコミット
        run: |
          if git diff --quiet cloud-bot/state.json; then
            echo "state.json に変更なし"
            exit 0
          fi
          git config user.name "cloud-bot"
          git config user.email "actions@github.com"
          git add cloud-bot/state.json
          git commit -m "cloud-bot: 状態を更新 [skip ci]"
          git push

      # 失敗したらIssueを自動作成して通知（毎時の連続失敗でも未クローズのIssueがあれば重複作成しない）
      - name: 失敗をIssueで通知
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create cloud-bot-failure --repo "${{ github.repository }}" --color D93F0B --description "Cloud Botの実行失敗" 2>/dev/null || true
          open_count=$(gh issue list --repo "${{ github.repository }}" --label cloud-bot-failure --state open --json number --jq 'length')
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          if [ "$open_count" -gt 0 ]; then
            issue_number=$(gh issue list --repo "${{ github.repository }}" --label cloud-bot-failure --state open --json number --jq '.[0].number')
            gh issue comment "$issue_number" --repo "${{ github.repository }}" --body "再び失敗しました: $run_url"
            echo "既存の失敗Issue #$issue_number にコメントを追加しました"
          else
            gh issue create --repo "${{ github.repository }}" \
              --label cloud-bot-failure \
              --title "🚨 Cloud Bot の実行が失敗しています" \
              --body "$(printf 'Cloud Bot（クイズ自動投稿）の実行が失敗しました。\n\n失敗した実行のログ: %s\n\nログの ❌ で始まる行に原因が表示されています。よくある原因はAPIキーの期限切れ・残高不足・X APIの権限変更です。解決したらこのIssueをクローズしてください（クローズするまで新しいIssueは作られず、再失敗はこのIssueへのコメントで通知されます）。' "$run_url")"
            echo "失敗Issueを作成しました"
          fi
